name: Collect tenders

on:
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        run: node scripts/collect-tenders.js

      - name: Commit feed if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh tender feed'
          file_pattern: data/tenders-feed.json

  deploy-pages:
    needs: collect
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Sync to latest commit
        run: git fetch origin ${{ github.ref_name }} && git checkout origin/${{ github.ref_name }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
