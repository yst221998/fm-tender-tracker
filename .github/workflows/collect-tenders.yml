name: Collect tenders

on:
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      feed_count: ${{ steps.feed_check.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        run: node scripts/collect-tenders.js

      - name: Check feed is non-empty
        id: feed_check
        continue-on-error: true
        run: |
          count=$(node -e "const f=require('./data/tenders-feed.json'); console.log((f.tenders||[]).length)")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Feed has $count tenders"
          if [ "$count" -eq "0" ]; then
            echo "Empty feed — skipping commit and deploy"
            exit 1
          fi

      - name: Commit feed if changed
        if: steps.feed_check.outputs.count != '0'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh tender feed'
          file_pattern: data/tenders-feed.json

  deploy-pages:
    needs: collect
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.collect.outputs.feed_count != '0'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Sync to latest commit
        run: git fetch origin ${{ github.ref_name }} && git checkout origin/${{ github.ref_name }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
